name: Release Build & Deploy

# 1. TRIGGER: Only run when you hit "Publish release" on GitHub
on:
  release:
    types: [published]

# 2. PERMISSIONS: Allow the script to upload files to the release page
permissions:
  contents: write

jobs:
  # ==========================================
  # LINUX BUILD
  # ==========================================
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.3'
          host: 'linux'
          target: 'desktop'

      - name: Install Linux Dependencies (OpenGL)
        run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev

      - name: Compile Engine
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release ..
          make -j$(nproc)

      # 3. Compress the Linux binary into a standard tarball
      - name: Package Linux Release
        run: tar -czvf FakePs4-Linux.tar.gz -C bin FakePs4

      # 4. Attach the compressed file to the GitHub Release
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: FakePs4-Linux.tar.gz

  # ==========================================
  # WINDOWS BUILD
  # ==========================================
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Qt6 (MinGW)
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_mingw'

      - name: Compile Engine
        run: |
          mkdir build
          cd build
          cmake -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release ..
          mingw32-make -j4

      - name: Package Windows DLLs (windeployqt)
        run: |
          cd bin
          windeployqt --compiler-runtime FakePs4.exe

      # 3. Zip the entire bin folder (which now has the .exe and .dlls)
      - name: Zip Windows Release
        run: Compress-Archive -Path bin\* -DestinationPath FakePs4-Windows.zip

      # 4. Attach the .zip file to the GitHub Release
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: FakePs4-Windows.zip